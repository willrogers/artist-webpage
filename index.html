<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jane Torbay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fff;
      color: #222;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .image-wrapper {
      width: 100%;
      max-width: 640px;
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      line-height: 1.8;
    }

    footer a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
    }

    footer a:hover {
      color: #000;
      border-color: #000;
    }
  </style>
</head>
<body>

  <header>
    <h1>Jane Torbay</h1>
    <p>Artist &amp; Painter</p>
  </header>

  <main class="image-wrapper">
    <img
      src="artwork.jpg"
      alt="Artwork by Jane Torbay"
      width="1200"
      height="1199"
    />
  </main>

  <footer>
    <p><a href="mailto:jane@janetorbay.com">jane@janetorbay.com</a></p>
    <p><a href="https://instagram.com/janetorbay" target="_blank" rel="noopener">@janetorbay</a></p>
    <p>Brighton, UK</p>
  </footer>

</body>
</html>
